name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master  # Updated from main to track your master branch

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NODE_VERSION: '22.22.0' # Forces the build engine to use supported Node 22 LTS
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" # Location of your frontend code
          api_location: ""  # Blank because your FastAPI is on App Services
          output_location: "dist" # Folder containing your built production files
