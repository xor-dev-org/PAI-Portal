name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master  # Change this to master if that is your primary branch

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/" # Location of your frontend code
          api_location: ""  # Leave blank since your backend is on App Services
          output_location: "dist" # Change to 'build' if using Create-React-App
          # FORCE AZURE TO USE A SUPPORTED NODE RUNTIME HERE:
          node_version: "22.22.0"
