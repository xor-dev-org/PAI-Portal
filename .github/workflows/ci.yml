    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      # 1. Install and compile your Vite application natively in GitHub
      - name: Install & Build Frontend
        run: |
          npm install
          npm run build

      # 2. Upload only the compiled distribution directory to Azure
      - name: Deploy to Azure SWA
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NODE_VERSION: '22.22.0'
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist" # Uploads only the dist folder files
          api_location: ""
          output_location: ""  # Empty because compilation is finished
          skip_app_build: true # Tells Azure to skip running npm build again
